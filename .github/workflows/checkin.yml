name: Telegram 自动签到

on:
  schedule:
    # 可添加多个 cron 时间，覆盖所有目标的定时需求
    # 脚本会根据 TARGETS_CONFIG 中每个目标的 schedule 字段自动匹配
    - cron: '0 1 * * *'   # UTC 01:00 (北京时间 09:00)
    - cron: '0 6 * * *'   # UTC 06:00 (北京时间 14:00)
    - cron: '0 14 * * *'  # UTC 14:00 (北京时间 22:00)
  workflow_dispatch:
    inputs:
      send_all:
        description: '向所有目标发送（忽略定时设置）'
        required: false
        type: boolean
        default: true
      target:
        description: '仅向指定目标发送（留空则按规则处理）'
        required: false
        type: string
        default: ''

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run checkin
        env:
          API_ID: ${{ secrets.API_ID }}
          API_HASH: ${{ secrets.API_HASH }}
          SESSION_STRING: ${{ secrets.SESSION_STRING }}
          TARGETS_CONFIG: ${{ secrets.TARGETS_CONFIG }}
          # 向后兼容旧的单目标配置
          TARGET: ${{ secrets.TARGET }}
          MESSAGE: ${{ secrets.MESSAGE }}
          WAIT_RESPONSE: ${{ secrets.WAIT_RESPONSE }}
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "${{ inputs.send_all }}" = "true" ] && [ -z "${{ inputs.target }}" ]; then
              ARGS="--all"
            elif [ -n "${{ inputs.target }}" ]; then
              ARGS="--target ${{ inputs.target }}"
            fi
          fi
          python checkin.py --all $ARGS
